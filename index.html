<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Custom AI</title>
  <style>
    /* Dark, minimalist aesthetic */
    body { 
      background: #0a0a0a; 
      color: #e0e0e0; 
      font-family: monospace; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      margin: 0; 
      padding: 15px; 
      box-sizing: border-box; 
    }
    #chat-box { 
      flex-grow: 1; 
      overflow-y: auto; 
      margin-bottom: 15px; 
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { 
      padding: 10px 14px; 
      border-radius: 8px; 
      max-width: 85%; 
      line-height: 1.4;
      word-wrap: break-word;
    }
    .user { 
      background: #2b2b2b; 
      align-self: flex-end; 
      border-bottom-right-radius: 2px;
    }
    .ai { 
      background: #171717; 
      color: #a8b2d1; 
      align-self: flex-start;
      border: 1px solid #222;
      border-bottom-left-radius: 2px;
    }
    .input-area { 
      display: flex; 
      gap: 8px; 
      padding-bottom: env(safe-area-inset-bottom);
    }
    input { 
      flex-grow: 1; 
      background: #171717; 
      border: 1px solid #333; 
      color: white; 
      padding: 14px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 16px; /* Prevents auto-zoom on iOS */
      outline: none; 
    }
    input:focus { border-color: #555; }
    button { 
      background: #e0e0e0; 
      color: #0a0a0a; 
      border: none; 
      padding: 14px 18px; 
      border-radius: 8px; 
      font-weight: bold; 
      font-family: monospace;
      cursor: pointer; 
    }
  </style>
</head>
<body>

  <div id="chat-box">
    <div class="msg ai">System online. Waiting for input.</div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    // --- PASTE YOUR API KEY BETWEEN THE QUOTES BELOW ---
    const API_KEY = 'AIzaSyDYD0tv_OD-z_hYF1KlPHp-PIMza55Cj58'; 
    
    const chatBox = document.getElementById('chat-box');
    const inputField = document.getElementById('userInput');

    // Allow pressing "Enter" on the phone keyboard to send
    inputField.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = inputField.value.trim();
      if (!text) return;
      
      // Post user message to screen
      chatBox.innerHTML += `<div class="msg user">${text}</div>`;
      inputField.value = '';
      
      // Add loading indicator
      const loadingId = 'load-' + Date.now();
      chatBox.innerHTML += `<div class="msg ai" id="${loadingId}">Processing...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        // Send request directly to Gemini API
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: text }] }] 
          })
        });
        
        const data = await response.json();
        document.getElementById(loadingId).remove(); // Remove loading text
        
        // Extract and display AI reply
        const aiReply = data.candidates[0].content.parts[0].text;
        chatBox.innerHTML += `<div class="msg ai">${aiReply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (error) {
        document.getElementById(loadingId).innerText = 'Error: Connection failed.';
      }
    }
  </script>
</body>
</html>
